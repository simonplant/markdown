<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Markdown</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fafafa;
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        padding: 4px 8px;
        background: #eee;
        border-bottom: 1px solid #ccc;
        flex-shrink: 0;
      }
      #toolbar button {
        padding: 4px 12px;
        cursor: pointer;
      }
      #editor {
        flex: 1;
        overflow: hidden;
      }
      .cm-editor {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-open">Open</button>
    </div>
    <div id="editor"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
