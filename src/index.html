<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fafafa;
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        padding: 4px 8px;
        background: #eee;
        border-bottom: 1px solid #ccc;
        flex-shrink: 0;
      }
      #toolbar button {
        padding: 4px 12px;
        cursor: pointer;
      }
      #editor-container {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }
      #editor {
        flex: 1;
        overflow: hidden;
        min-width: 0;
      }
      .cm-editor {
        height: 100%;
      }
      #preview {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 2rem;
        display: none;
        min-width: 0;
        border-left: 1px solid #E0E0E0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans",
          "Helvetica Neue", Arial, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        max-height: 100%;
      }
      #preview.visible {
        display: block;
      }
      #preview h1 { font-size: 1.6em; margin: 0.6em 0 0.4em; }
      #preview h2 { font-size: 1.35em; margin: 0.6em 0 0.4em; }
      #preview h3 { font-size: 1.15em; margin: 0.6em 0 0.4em; }
      #preview pre {
        background: #F0F0F0;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.9em;
      }
      #preview code {
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.9em;
      }
      #preview :not(pre) > code {
        background: #F0F0F0;
        padding: 1px 4px;
        border-radius: 3px;
      }
      #preview blockquote {
        border-left: 3px solid #0969DA;
        padding-left: 12px;
        margin-left: 0;
        color: #57606A;
      }
      #preview img { max-width: 100%; border-radius: 4px; }
      #preview hr { border: none; border-top: 2px solid #D0D7DE; margin: 1em 0; }
      #preview a { color: #0969DA; }
      #preview table { border-collapse: collapse; }
      #preview th, #preview td { border: 1px solid #D0D7DE; padding: 6px 12px; }
      #preview input[type="checkbox"] { margin-right: 4px; }
      #status-bar {
        height: 24px;
        line-height: 24px;
        padding: 0 12px;
        font-size: 12px;
        color: #6E7781;
        background: #F5F5F5;
        border-top: 1px solid #E0E0E0;
        flex-shrink: 0;
        display: flex;
        gap: 16px;
      }
      .cm-backlinks-btn {
        text-decoration: underline;
        text-decoration-color: rgba(110, 119, 129, 0.4);
      }
      .cm-backlinks-btn:hover {
        color: #0969DA;
      }
      .cm-backlinks-panel {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 280px;
        background: #FAFAFA;
        border-left: 1px solid #E0E0E0;
        flex-direction: column;
        z-index: 10;
        overflow-y: auto;
      }
      .cm-backlinks-header {
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #24292F;
        border-bottom: 1px solid #E0E0E0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cm-backlinks-close {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: #6E7781;
        padding: 0 4px;
      }
      .cm-backlinks-close:hover { color: #24292F; }
      .cm-backlinks-list { padding: 4px 0; }
      .cm-backlinks-item {
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      .cm-backlinks-item:hover { background: #F0F0F0; }
      .cm-backlinks-filename {
        color: #0969DA;
        font-weight: 500;
      }
      .cm-backlinks-line {
        color: #8B949E;
        font-size: 12px;
      }
      .cm-backlinks-context {
        color: #57606A;
        font-size: 12px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cm-backlinks-empty, .cm-backlinks-loading {
        padding: 12px;
        color: #8B949E;
        font-size: 13px;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        html, body {
          background: #1E1E1E;
        }
        #toolbar {
          background: #2A2A2A;
          border-bottom-color: #333333;
        }
        #toolbar button {
          background: #3A3A3A;
          color: #D4D4D4;
          border: 1px solid #555;
        }
        #status-bar {
          color: #858585;
          background: #252526;
          border-top-color: #333333;
        }
        #preview {
          background: #1E1E1E;
          color: #D4D4D4;
          border-left-color: #333333;
        }
        #preview pre { background: #2A2A2A; }
        #preview :not(pre) > code { background: #2A2A2A; }
        #preview blockquote { border-left-color: #4FC1FF; color: #9DA5B4; }
        #preview hr { border-top-color: #555D66; }
        #preview a { color: #4FC1FF; }
        #preview th, #preview td { border-color: #444C56; }
        #preview h1, #preview h2, #preview h3 { color: #7EB6FF; }
        .cm-backlinks-btn:hover { color: #4FC1FF; }
        .cm-backlinks-panel {
          background: #252526;
          border-left-color: #333333;
        }
        .cm-backlinks-header {
          color: #D4D4D4;
          border-bottom-color: #333333;
        }
        .cm-backlinks-close { color: #858585; }
        .cm-backlinks-close:hover { color: #D4D4D4; }
        .cm-backlinks-item:hover { background: #2A2A2A; }
        .cm-backlinks-filename { color: #4FC1FF; }
        .cm-backlinks-line { color: #858585; }
        .cm-backlinks-context { color: #9DA5B4; }
        .cm-backlinks-empty, .cm-backlinks-loading { color: #858585; }
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-open">Open</button>
      <button id="btn-preview">Preview</button>
    </div>
    <div id="editor-container">
      <div id="editor"></div>
      <div id="preview"></div>
    </div>
    <div id="status-bar">
      <span id="stat-words">0 words</span>
      <span id="stat-chars">0 characters</span>
      <span id="stat-reading">0 min read</span>
      <span id="stat-ai" style="margin-left: auto; opacity: 0; transition: opacity 0.3s; color: #0969DA;"></span>
      <span id="stat-save" style="opacity: 0; transition: opacity 0.3s;"></span>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
