name: MarkdownEditor
options:
  bundleIdPrefix: com.markdown
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  MarkdownCore:
    path: Packages/MarkdownCoreFFI
  SwiftMath:
    url: https://github.com/mgriebling/SwiftMath
    from: "1.5.0"

targets:
  MarkdownEditor:
    type: application
    platform: iOS
    sources:
      - path: MarkdownEditor
    dependencies:
      - package: MarkdownCore
        product: MarkdownCore
      - package: SwiftMath
        product: SwiftMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markdown.editor
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        # Simulator builds need no signing; keeps the build hermetic on CI/headless.
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    info:
      path: MarkdownEditor/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportsDocumentBrowser: true
        LSSupportsOpeningDocumentsInPlace: true
        UIApplicationSupportsIndirectInputEvents: true
        # Export the app's OWN markdown UTI (unique id, conforms to plain-text,
        # owns the .md/.markdown extensions) so new-document CREATION works —
        # without re-declaring the system net.daringfireball.markdown (which would
        # trigger a "duplicate type identifier" error). We still READ files typed
        # by the system as net.daringfireball.markdown.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.markdown.editor.markdown
              - net.daringfireball.markdown
              - public.plain-text
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.markdown.editor.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown

  # macOS app — same sources, same Rust core; the views shim UIKit→AppKit via
  # Platform.swift / #if os (IOS_BUILD_SPEC M9: iOS + macOS share the surface).
  MarkdownEditorMac:
    type: application
    platform: macOS
    sources:
      - path: MarkdownEditor
    dependencies:
      - package: MarkdownCore
        product: MarkdownCore
      - package: SwiftMath
        product: SwiftMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markdown.editor.mac
        PRODUCT_NAME: MarkdownEditor
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
    info:
      path: MarkdownEditorMac/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.markdown.editor.markdown
              - net.daringfireball.markdown
              - public.plain-text
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.markdown.editor.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown

  MarkdownEditorUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MarkdownEditorUITests
    dependencies:
      - target: MarkdownEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markdown.editor.uitests
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: MarkdownEditor
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"

schemes:
  MarkdownEditor:
    build:
      targets:
        MarkdownEditor: all
        MarkdownEditorUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MarkdownEditorUITests
  MarkdownEditorMac:
    build:
      targets:
        MarkdownEditorMac: all
    run:
      config: Debug
