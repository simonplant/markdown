name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Rust engine: build, unit tests, and the CommonMark conformance suite.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build workspace
        run: cargo build --workspace
      - name: Run tests
        run: cargo test --workspace
      - name: Run CommonMark spec suite
        run: cargo test -p markdown-core --test commonmark -- --nocapture

  # Web PWA: typecheck + bundle. (The WASM core is loaded at runtime from
  # public/markdown_core.wasm; the bundle builds without it present.)
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install npm dependencies
        run: npm ci
      - name: Build web bundle (tsc + vite)
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Core → WebAssembly: compile to wasm32-wasip1 and run the JS<->WASM boundary
  # harness. Best-effort while the wasi-sdk pin is validated in CI (the build is
  # proven locally via scripts/build-wasm.sh); does not gate merges yet.
  wasm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wasi-sdk
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz \
            | sudo tar xz -C /opt
          echo "WASI_SDK=/opt/wasi-sdk-24.0-x86_64-linux" >> "$GITHUB_ENV"
      - name: Build + run WASM boundary harness
        run: |
          export LLVM_PREFIX="$WASI_SDK"
          export WASI_SYSROOT="$WASI_SDK/share/wasi-sysroot"
          bash scripts/build-wasm.sh node

  # Performance regression gate against docs/baseline.json.
  baseline-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run baseline regression check
        run: bash scripts/measure_baseline.sh --check
