name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Run CommonMark spec suite
        run: cargo test -p em-core --test commonmark -- --nocapture

      - name: Build Tauri app bundle
        run: cargo tauri build
        env:
          CI: true

      - name: Verify .app bundle exists
        run: ls -la src-tauri/target/release/bundle/macos/*.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Upload dist-web artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-web
          path: dist-web/

  baseline-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run baseline regression check
        run: bash scripts/measure_baseline.sh --check
