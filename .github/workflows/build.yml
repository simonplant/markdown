name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Run CommonMark spec suite
        run: cargo test -p markdown-core --test commonmark -- --nocapture

      - name: Build Tauri app bundle
        run: cargo tauri build
        env:
          CI: true

      - name: Verify .app bundle exists
        run: ls -la src-tauri/target/release/bundle/macos/*.app

  baseline-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run baseline regression check
        run: |
          if [[ ! -f docs/baseline.json ]]; then
            echo "::warning::docs/baseline.json not present — skipping baseline regression check. Run the 'Capture Baseline' workflow to re-establish one."
            exit 0
          fi
          bash scripts/measure_baseline.sh --check
